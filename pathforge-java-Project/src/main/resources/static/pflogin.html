<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>PathForge Login</title>

    <link rel="stylesheet"
          href="css/pfauth.css">

</head>

<body>

    <div class="auth-container">

        <!-- LEFT SIDE -->

        <div class="auth-left">

            <img src="images/main_logo.png"
                 class="logo">

            <h1>PathForge</h1>

            <p class="tagline">

                BUILD • CONNECT • ACHIEVE

            </p>

            <p class="description">

                Create interactive learning roadmaps,
                organize your goals,
                and track your journey visually.

            </p>

        </div>

        <!-- RIGHT SIDE -->

        <div class="auth-right">

            <div class="auth-card">

                <h2>Welcome Back 👋</h2>

                <p class="sub-text">

                    Login to continue your journey

                </p>

                <input type="email"
                       id="loginEmail"
                       placeholder="Enter Email">

                <input type="password"
                       id="loginPassword"
                       placeholder="Enter Password">

                <button onclick="login()">

                    Login

                </button>

                <p class="bottom-text">

                    Don't have an account?

                    <a href="pfsignup.html">

                        Sign Up

                    </a>

                </p>

            </div>

        </div>

    </div>

    <script src="js/pfauth.js"></script>

</body>

</html>
