<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>PathForge Signup</title>

    <link rel="stylesheet"
          href="css/pfauth.css">

</head>

<body>

    <div class="auth-container">

        <!-- LEFT SIDE -->

        <div class="auth-left">

            <img src="images/main_logo.png"
                 class="logo">

            <h1>PathForge</h1>

            <p class="tagline">

                BUILD • CONNECT • ACHIEVE

            </p>

            <p class="description">

                Build powerful learning paths,
                connect your goals,
                and achieve your dream career.

            </p>

        </div>

        <!-- RIGHT SIDE -->

        <div class="auth-right">

            <div class="auth-card">

                <h2>Create Account 🚀</h2>

                <p class="sub-text">

                    Start building your roadmap

                </p>

                <input type="text"
                       id="username"
                       placeholder="Enter Username">

                <input type="email"
                       id="email"
                       placeholder="Enter Email">

                <input type="password"
                       id="password"
                       placeholder="Enter Password">

                <button onclick="signup()">

                    Sign Up

                </button>

                <p class="bottom-text">

                    Already have an account?

                    <a href="pflogin.html">

                        Login

                    </a>

                </p>

            </div>

        </div>

    </div>

    <script src="js/pfauth.js"></script>

</body>

</html>
